name: Release Beta

on:
  push:
    branches: [beta]

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version-name: ${{ steps.version.outputs.version-name }}
      tag: ${{ steps.version.outputs.tag }}
      release-name: ${{ steps.version.outputs.release-name }}
      artifact-prefix: ${{ steps.version.outputs.artifact-prefix }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version info
        id: version
        run: |
          VERSION=$(grep '^version-name\s*=' gradle/libs.versions.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version-name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=compose-animation-beta-$VERSION" >> "$GITHUB_OUTPUT"
          echo "release-name=Compose Animation Beta $VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact-prefix=compose-animation-beta-$VERSION" >> "$GITHUB_OUTPUT"

  build-android:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Rename artifact
        run: |
          PREFIX="${{ needs.resolve-version.outputs.artifact-prefix }}"
          cp androidApp/build/outputs/apk/debug/*.apk "$PREFIX.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ needs.resolve-version.outputs.artifact-prefix }}.apk

  build-desktop-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build deb package
        run: ./gradlew :composeApp:packageDeb
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Rename artifact
        run: |
          PREFIX="${{ needs.resolve-version.outputs.artifact-prefix }}"
          cp composeApp/build/compose/binaries/main/deb/*.deb "$PREFIX.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: ${{ needs.resolve-version.outputs.artifact-prefix }}.deb

  build-desktop-linux-rpm:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build rpm package
        run: ./gradlew :composeApp:packageRpm
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Rename artifact
        run: |
          PREFIX="${{ needs.resolve-version.outputs.artifact-prefix }}"
          cp composeApp/build/compose/binaries/main/rpm/*.rpm "$PREFIX.rpm"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: ${{ needs.resolve-version.outputs.artifact-prefix }}.rpm

  build-desktop-linux-tar:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build distributable app
        run: ./gradlew :composeApp:createDistributable
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Package as tar.gz
        run: |
          PREFIX="${{ needs.resolve-version.outputs.artifact-prefix }}"
          tar -czf "$PREFIX.tar.gz" -C composeApp/build/compose/binaries/main/app .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: ${{ needs.resolve-version.outputs.artifact-prefix }}.tar.gz

  build-desktop-windows:
    needs: resolve-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build msi package
        run: ./gradlew :composeApp:packageMsi
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Rename artifact
        shell: bash
        run: |
          PREFIX="${{ needs.resolve-version.outputs.artifact-prefix }}"
          cp composeApp/build/compose/binaries/main/msi/*.msi "$PREFIX.msi"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: ${{ needs.resolve-version.outputs.artifact-prefix }}.msi

  build-desktop-macos:
    needs: resolve-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build dmg package
        run: ./gradlew :composeApp:packageDmg
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Rename artifact
        run: |
          PREFIX="${{ needs.resolve-version.outputs.artifact-prefix }}"
          cp composeApp/build/compose/binaries/main/dmg/*.dmg "$PREFIX.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ needs.resolve-version.outputs.artifact-prefix }}.dmg

  build-web-wasm:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build WASM distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Zip output
        run: |
          PREFIX="${{ needs.resolve-version.outputs.artifact-prefix }}"
          cd composeApp/build/dist/wasmJs/productionExecutable
          zip -r "$GITHUB_WORKSPACE/$PREFIX-wasm.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web-wasm
          path: ${{ needs.resolve-version.outputs.artifact-prefix }}-wasm.zip

  build-web-js:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build JS distribution
        run: ./gradlew :composeApp:jsBrowserDistribution
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Zip output
        run: |
          PREFIX="${{ needs.resolve-version.outputs.artifact-prefix }}"
          cd composeApp/build/dist/js/productionExecutable
          zip -r "$GITHUB_WORKSPACE/$PREFIX-js.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web-js
          path: ${{ needs.resolve-version.outputs.artifact-prefix }}-js.zip

  create-release:
    needs:
      - resolve-version
      - build-android
      - build-desktop-linux
      - build-desktop-linux-rpm
      - build-desktop-linux-tar
      - build-desktop-windows
      - build-desktop-macos
      - build-web-wasm
      - build-web-js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          RELEASE_NAME="${{ needs.resolve-version.outputs.release-name }}"

          gh release create "$TAG" \
            --title "$RELEASE_NAME" \
            --generate-notes \
            --prerelease \
            artifacts/*